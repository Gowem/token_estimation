# Configurable model registry for the Prompt Token Estimator.
#
# Add, remove, or edit entries here to change which models are offered in the
# app -- no code changes required. `context_window: null` means the figure is
# unverified; the estimator will skip context-limit checking for that model
# and surface a warning instead of guessing.
#
# Currently Groq-only (the only provider this deployment has a key for).
# To add another provider: add entries here with a new `provider` value,
# implement a TokenizerStrategy in tokenizers.py and an Executor in
# executors.py for it, and register both in their respective dicts --
# estimator.py, models.py, and app.py need no changes.
#
# Pricing/context figures below were checked against groq.com/pricing on
# 2026-07-03. Prices change -- re-verify before relying on this for real
# budgeting.

models:
  - provider: meta
    model_id: llama-3.1-8b-instant
    display_name: "Llama 3.1 8B Instant (Groq)"
    context_window: 128000
    input_price_per_million: 0.05
    output_price_per_million: 0.08
    tokenizer: heuristic
    notes: "groq.com/pricing, checked 2026-07-03."

  - provider: meta
